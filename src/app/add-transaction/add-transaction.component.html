<section class="page-narrow">
  <div class="page-head">
    <h1 class="page-title">Add transaction</h1>
    <p class="page-subtitle">Record income or an expense</p>
  </div>

  <p-card>
    <form class="form-stack" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="tx-type" class="field-label">Type</label>
        <p-select
          inputId="tx-type"
          formControlName="type"
          [options]="typeOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Select type"
          [fluid]="true"
        />
      </div>

      <div class="field">
        <label for="tx-amount" class="field-label">Amount</label>
        <p-inputNumber
          inputId="tx-amount"
          formControlName="amount"
          mode="decimal"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
          placeholder="0.00"
          [min]="0.01"
          [fluid]="true"
          [class.p-invalid]="submitted && form.controls.amount.invalid"
        />
      </div>

      <div class="field">
        <label for="tx-cat" class="field-label">Category</label>
        <input
          id="tx-cat"
          type="text"
          pInputText
          [fluid]="true"
          formControlName="category"
          placeholder="e.g. Groceries"
          autocomplete="off"
          [class.p-invalid]="submitted && form.controls.category.invalid"
        />
      </div>

      <div class="field">
        <label for="tx-note" class="field-label">Note</label>
        <textarea
          id="tx-note"
          pTextarea
          [fluid]="true"
          formControlName="note"
          rows="2"
          placeholder="Optional"
        ></textarea>
      </div>

      <div class="field">
        <label for="tx-date" class="field-label">Date</label>
        <p-datepicker
          inputId="tx-date"
          formControlName="date"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          [fluid]="true"
          [class.p-invalid]="submitted && form.controls.date.invalid"
        />
      </div>

      @if (submitted && form.invalid) {
        <p class="m-0 field-error">Please fix the highlighted fields.</p>
      }

      @if (errorMessage(); as err) {
        <p class="m-0 field-error">{{ err }}</p>
      }

      <div class="form-actions">
        <p-button type="submit" label="Save" [loading]="saving()" [disabled]="saving()" />
        <a routerLink="/transactions" pButton type="button" [outlined]="true">Cancel</a>
      </div>
    </form>
  </p-card>
</section>
