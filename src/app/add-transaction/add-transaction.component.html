<section class="mx-auto max-w-md">
  <div class="mb-8">
    <h1 class="text-2xl font-semibold tracking-tight text-zinc-900">Add transaction</h1>
    <p class="mt-1 text-sm text-zinc-500">Record income or an expense</p>
  </div>

  <form
    class="space-y-4 rounded-2xl border border-zinc-200/80 bg-white p-6 shadow-sm ring-1 ring-zinc-950/5"
    [formGroup]="form"
    (ngSubmit)="submit()"
  >
    <label class="block">
      <span class="mb-1.5 block text-sm font-medium text-zinc-700">Type</span>
      <select
        formControlName="type"
        class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
      >
        @for (opt of types; track opt) {
          <option [value]="opt">{{ opt }}</option>
        }
      </select>
    </label>

    <label class="block">
      <span class="mb-1.5 block text-sm font-medium text-zinc-700">Amount</span>
      <input
        type="number"
        formControlName="amount"
        min="0.01"
        step="0.01"
        placeholder="0.00"
        class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
        [class.border-red-300]="submitted && form.controls.amount.invalid"
      />
    </label>

    <label class="block">
      <span class="mb-1.5 block text-sm font-medium text-zinc-700">Category</span>
      <input
        type="text"
        formControlName="category"
        placeholder="e.g. Groceries"
        autocomplete="off"
        class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
        [class.border-red-300]="submitted && form.controls.category.invalid"
      />
    </label>

    <label class="block">
      <span class="mb-1.5 block text-sm font-medium text-zinc-700">Note</span>
      <textarea
        formControlName="note"
        rows="2"
        placeholder="Optional"
        class="w-full resize-y rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
      ></textarea>
    </label>

    <label class="block">
      <span class="mb-1.5 block text-sm font-medium text-zinc-700">Date</span>
      <input
        type="date"
        formControlName="date"
        class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2.5 text-sm text-zinc-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
        [class.border-red-300]="submitted && form.controls.date.invalid"
      />
    </label>

    @if (submitted && form.invalid) {
      <p class="text-sm text-red-600">Please fix the highlighted fields.</p>
    }

    @if (errorMessage(); as err) {
      <p class="text-sm text-red-600">{{ err }}</p>
    }

    <div class="flex flex-wrap gap-2 pt-1">
      <button
        type="submit"
        class="inline-flex min-h-[2.5rem] items-center justify-center rounded-xl bg-blue-600 px-5 py-2 text-sm font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="saving()"
      >
        {{ saving() ? 'Saving…' : 'Save' }}
      </button>
      <a
        routerLink="/transactions"
        class="inline-flex min-h-[2.5rem] items-center justify-center rounded-xl border border-zinc-200 bg-white px-5 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-50"
        >Cancel</a
      >
    </div>
  </form>
</section>
