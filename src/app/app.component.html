<amplify-authenticator [loginMechanisms]="['email']">
  <ng-template amplifySlot="authenticated">
    <div class="flex min-h-screen flex-col bg-zinc-50 text-zinc-900">
      <header
        class="sticky top-0 z-10 flex flex-wrap items-center justify-between gap-3 border-b border-zinc-200/80 bg-white/90 px-4 py-3 backdrop-blur sm:px-6"
      >
        <a
          routerLink="/dashboard"
          class="text-base font-semibold tracking-tight text-zinc-900 transition hover:text-blue-600"
          >{{ title }}</a
        >
        <nav class="flex flex-wrap items-center gap-1" aria-label="Main">
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-zinc-100 text-zinc-900 font-medium"
            [routerLinkActiveOptions]="{ exact: true }"
            class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-zinc-100 hover:text-zinc-900"
            >Dashboard</a
          >
          <a
            routerLink="/add"
            routerLinkActive="bg-zinc-100 text-zinc-900 font-medium"
            class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-zinc-100 hover:text-zinc-900"
            >Add</a
          >
          <a
            routerLink="/transactions"
            routerLinkActive="bg-zinc-100 text-zinc-900 font-medium"
            class="rounded-lg px-3 py-1.5 text-sm text-zinc-500 transition hover:bg-zinc-100 hover:text-zinc-900"
            >Transactions</a
          >
        </nav>
        <button
          type="button"
          class="rounded-lg border border-zinc-200 bg-white px-3 py-1.5 text-sm font-medium text-zinc-700 transition hover:border-red-200 hover:bg-red-50 hover:text-red-700"
          (click)="signOut()"
        >
          Sign out
        </button>
      </header>

      <main class="flex-1 px-4 pb-10 pt-6 sm:px-6 sm:pt-8">
        <router-outlet />
      </main>
    </div>
  </ng-template>
</amplify-authenticator>
